name: CI

on:
  push:
    branches: [main, "skynet/**"]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pre-commit
        run: pre-commit run --all-files

  test:
    name: Test (Python ${{ matrix.python-version }}, Django ${{ matrix.django-version }})
    runs-on: ubuntu-latest
    needs: pre-commit
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
        django-version: ["4.2", "5.1"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install "Django>=${{ matrix.django-version }},<6"

      - name: Run migrations
        run: python example/manage.py migrate --noinput

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/bdd --cov=piggyback --cov-report=xml

  e2e:
    name: BDD / Playwright E2E
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          playwright install --with-deps chromium

      - name: Run migrations
        run: python example/manage.py migrate --noinput

      - name: Run BDD Playwright tests
        env:
          DJANGO_ALLOW_ASYNC_UNSAFE: "true"
        run: pytest tests/bdd -v

  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material

      - name: Build docs
        run: mkdocs build -f docs/mkdocs.yml

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t piggyback:test .

      - name: Smoke test container
        run: |
          docker run -d --name piggyback-smoke -p 8000:8000 piggyback:test
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/ >/dev/null; then
              echo "Container healthy"
              docker stop piggyback-smoke
              exit 0
            fi
            sleep 2
          done
          docker logs piggyback-smoke
          exit 1
