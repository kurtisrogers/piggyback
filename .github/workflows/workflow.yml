name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-token:
    name: Publish to PyPI (API token)
    needs: build
    if: ${{ secrets.PYPI_API_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-oidc:
    name: Publish to PyPI (trusted publishing)
    needs: build
    if: ${{ secrets.PYPI_API_TOKEN == '' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Trusted publisher requirements
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Trusted publishing requirements

          Your PyPI pending publisher must match **exactly**:

          | Field | Required value |
          |-------|----------------|
          | PyPI project | `pypiggyback` |
          | Owner | `kurtisrogers` |
          | Repository | `piggyback` (**all lowercase**) |
          | Workflow | `workflow.yml` |
          | Environment | *(leave blank / Any)* |

          **Common failure:** PyPI shows `Piggyback` but GitHub sends `piggyback`.

          Fix at: https://pypi.org/manage/account/publishing/

          Or add a `PYPI_API_TOKEN` secret to skip OIDC entirely.
          EOF

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
