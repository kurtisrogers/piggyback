name: Protect main branch

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  administration: write
  contents: read

jobs:
  protect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply branch protection rules
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/protect-main-branch.sh
