<!DOCTYPE html>
<html>
<body style="font-family: Georgia, serif; background: #FFF8F0; padding: 40px;">
  <div style="max-width: 500px; margin: 0 auto; background: white; border-radius: 12px; padding: 40px; text-align: center;">
    <p style="font-size: 48px;">💌</p>
    <h1 style="color: #E85D75;">You've got a card!</h1>
    <p>{{ sender.get_full_name|default:sender.username }} sent you a personalised card.</p>
    {% if inside_message %}
    <blockquote style="font-style: italic; color: #555; border-left: 3px solid #E85D75; padding-left: 16px; text-align: left;">
      {{ inside_message|linebreaks }}
    </blockquote>
    {% endif %}
    <a href="{{ view_url }}" style="display: inline-block; background: #E85D75; color: white; padding: 14px 32px; border-radius: 8px; text-decoration: none; margin-top: 20px;">
      Open Your Card
    </a>
  </div>
</body>
</html>
